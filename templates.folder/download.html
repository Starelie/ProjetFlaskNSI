{% extends "base.html" %}

{% block stylesheet %}
<link rel="stylesheet" href="{{ url_for("static", filename="download.css")}}">
<link rel="stylesheet" href="{{ url_for("static", filename="grid.css")}}">
{% endblock %}

{% block title %}Download{% endblock %}

{% block body %}
<h1>Télécharger un fichier</h1>
<ul id="files-list">
  <li class="top-row first-column">Fichiers disponibles</li><li class="top-row second-column">Télécharger</li>
  {% for file in files %}
  <li class="first-column">{{file}}</li>
  <form method="GET">
    <input type="hidden" id="downloaded-file" name="downloaded_file" value={{file}}>
    <a type="submit" value="download">
      <span class="underline csecond-column">download</span><i class="fa-solid fa-download"></i>
    </a>
  </form>
  {% endfor %}
</ul>
{% endblock %}
