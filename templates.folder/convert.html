{% extends "base.html" %}

{% block stylesheet %}
<link rel="stylesheet" href="{{ url_for("static", filename="convert.css")}}">
<link rel="stylesheet" href="{{ url_for("static", filename="grid.css")}}">
{% endblock %}
{% block icon %}<link rel="icon" href="{{ url_for('static', filename='cat-face.ico') }}">{% endblock %}

{% block title %}Convert{% endblock %}

{% block body %}
<h1>Convert File</h1>
<ul id="files-list">
  <li class="top-row first-column">Available files</li><li class="top-row second-column">Selection</li>
  {% for file in files %}
  <li class="first-column">{{file}}</li><li class="second-column"><span class="underline">select</span><span>☐</span></li>
  {% endfor %}
</ul>
<script src="{{url_for("static", filename="convert.js")}}"></script>
{% endblock %}
